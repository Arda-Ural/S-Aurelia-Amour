<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S'Aurelia Amour | Maison de Parfum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --true-gold: #f5e08f; 
            --rich-gold: #e6c15c; 
            --gold-shadow: rgba(230, 193, 92, 0.5);
            --black: #050505; 
        }
        
        * { box-sizing: border-box; transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        body { background: var(--black); color: #fdfdfd; font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }

        /* --- AÇILIŞ EKRANI (INTRO) --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: 1.2s ease-in-out;
        }

        .intro-brand {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(2.5rem, 10vw, 5rem);
            letter-spacing: 8px;
            background: linear-gradient(135deg, var(--true-gold) 10%, var(--rich-gold) 50%, var(--true-gold) 90%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--gold-shadow));
            opacity: 0;
            transform: scale(0.9);
            animation: introReveal 2.5s forwards ease-out;
        }

        @keyframes introReveal {
            0% { opacity: 0; transform: scale(0.85) translateY(20px); filter: blur(10px); }
            50% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Intro bittiğinde içeriğin gelmesi */
        .loaded #intro-overlay {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        /* --- ANA TASARIM --- */
        nav { 
            padding: 40px; 
            text-align: center; 
            border-bottom: 1px solid #1a1a1a; 
            position: sticky; 
            top: 0; 
            background: rgba(5,5,5,0.98); 
            z-index: 1000; 
            backdrop-filter: blur(15px);
            opacity: 0; /* Başta gizli */
        }
        
        .loaded nav { opacity: 1; transition-delay: 1s; }

        .brand {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3.2rem;
            margin: 0;
            cursor: pointer;
            letter-spacing: 5px;
            background: linear-gradient(135deg, var(--true-gold) 10%, var(--rich-gold) 50%, var(--true-gold) 90%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--gold-shadow));
        }

        .nav-links { margin-top: 20px; font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; color: #666; }
        .nav-links span { margin: 0 15px; cursor: pointer; }
        .nav-links span:hover { color: var(--true-gold); text-shadow: 0 0 10px var(--gold-shadow); }

        .container { max-width: 1400px; margin: 0 auto; padding: 60px 20px; opacity: 0; }
        .loaded .container { opacity: 1; transition: 1.5s; transition-delay: 1.2s; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 50px; }
        
        .card { 
            background: #0c0c0c; 
            border: 1px solid #1a1a1a; 
            overflow: hidden; 
            position: relative;
        }
        .card:hover { border-color: var(--rich-gold); transform: translateY(-10px); box-shadow: 0 25px 60px rgba(0,0,0,0.9); }
        
        .img-container { width: 100%; height: 480px; overflow: hidden; background: #000; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .card:hover img { opacity: 1; transform: scale(1.08); }

        .price-tag {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--rich-gold);
            color: var(--true-gold);
            padding: 8px 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .card-info { padding: 40px; text-align: center; }
        .card-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 2.2rem; color: var(--rich-gold); margin-bottom: 15px; }
        .card-desc { font-size: 0.9rem; color: #aaa; line-height: 1.8; margin-bottom: 30px; font-weight: 300; min-height: 80px; white-space: pre-line; }

        .gold-btn {
            background: transparent;
            border: 1px solid var(--true-gold);
            color: var(--true-gold);
            padding: 18px 35px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            width: 100%;
            font-size: 0.8rem;
            text-decoration: none;
            display: inline-block;
        }
        .gold-btn:hover { background: var(--true-gold); color: #000; box-shadow: 0 0 25px var(--gold-shadow); }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.99); z-index: 9999; padding: 40px; }
        .modal-content { max-width: 600px; margin: 40px auto; background: #080808; padding: 50px; border: 1px solid var(--rich-gold); text-align: center; }
        input, textarea { width: 100%; padding: 18px; margin: 10px 0; background: #111; border: 1px solid #222; color: white; font-family: inherit; }
        .active { display: block !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- AÇILIŞ EKRANI -->
    <div id="intro-overlay">
        <div class="intro-brand">S'Aurelia Amour</div>
    </div>

    <nav>
        <div class="brand" onclick="location.reload()">S'Aurelia Amour</div>
        <div class="nav-links">
            <span onclick="location.reload()">Koleksiyon</span>
            <span id="nav-login-btn" onclick="openModal('login')">Giriş</span>
            <span id="nav-user-info" class="hidden">Hoş geldin, <b id="user-display" style="color:var(--true-gold)"></b> | <a onclick="logout()" style="color:#ff4444; cursor:pointer">Çıkış</a></span>
            <span onclick="adminAccess()" style="color:var(--true-gold); padding-left:25px; border-left:1px solid #333;">Yönetim</span>
        </div>
    </nav>

    <div class="container">
        <div id="product-list" class="product-grid"></div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="modal-admin" class="modal">
        <div class="modal-content">
            <h2 class="brand" style="font-size: 2rem;">Yönetim</h2>
            <input type="text" id="p-name" placeholder="Parfüm Adı">
            <input type="text" id="p-price" placeholder="Fiyat (Örn: 2.450 TL)">
            <input type="text" id="p-img" placeholder="Fotoğraf Linki">
            <textarea id="p-desc" style="height:120px" placeholder="Açıklama ve Notalar..."></textarea>
            <button class="gold-btn" onclick="addProduct()">Koleksiyona Ekle</button>
            <div id="admin-inventory" style="margin-top:25px; text-align:left; max-height:200px; overflow-y:auto;"></div>
            <button onclick="closeModals()" class="gold-btn" style="border-color:red; color:red; margin-top:20px;">KAPAT</button>
        </div>
    </div>

    <!-- LOGIN PANEL -->
    <div id="modal-login" class="modal">
        <div class="modal-content">
            <h2 class="brand" style="font-size: 2rem;">Giriş</h2>
            <input type="text" id="l-user" placeholder="Kullanıcı Adı">
            <input type="password" id="l-pass" placeholder="Şifre">
            <button class="gold-btn" onclick="login()">Giriş Yap</button>
            <button onclick="closeModals()" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer;">[ Kapat ]</button>
        </div>
    </div>
